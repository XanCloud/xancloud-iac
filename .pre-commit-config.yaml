repos:
  - repo: https://github.com/tofuutils/pre-commit-opentofu
    rev: v2.1.0
    hooks:
      - id: tofu_fmt
      - id: tofu_validate
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key
  - repo: local
    hooks:
      - id: check-context-docs
        name: Check if context docs need update
        entry: bash scripts/check-context-docs.sh
        language: system
        always_run: true
        pass_filenames: false
        verbose: true
